version: "3.8"

x-common-variables: &common-variables
  APP_ENV: production
  DEBUG: false

x-common-volumes: &common-volumes
  - ./logs:/app/logs

services:
  web:
    image: nginx:latest
    environment:
      <<: *common-variables
      WEB_PORT: 80
    volumes:
      <<: *common-volumes
      - ./html:/usr/share/nginx/html
    networks:
      - frontend

  api:
    build: ./api
    environment:
      <<: *common-variables
      API_PORT: 8000
    volumes:
      <<: *common-volumes
    networks:
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge