version: "3.8"

services:
  web:
    # 镜像配置
    image: nginx:latest
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        BUILD_ENV: production

    # 端口配置
    ports:
      - "80:80"
      - "443:443"
    expose:
      - "80"
      - "443"

    # 环境变量
    environment:
      - APP_ENV=production
      - DEBUG=false
    env_file:
      - ./web.env

    # 命令配置
    command: ["nginx", "-g", "daemon off;"]
    entrypoint: ["/docker-entrypoint.sh"]

    # 工作目录
    working_dir: /app

    # 用户配置
    user: "1000:1000"

    # 网络配置
    networks:
      - frontend
      - backend
    network_mode: bridge
    dns:
      - 8.8.8.8
      - 8.8.4.4
    dns_search:
      - example.com

    # 存储配置
    volumes:
      - ./html:/usr/share/nginx/html
      - web-logs:/var/log/nginx
    tmpfs:
      - /tmp:size=100m
    volume_driver: local

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    cpu_shares: 512
    mem_limit: 512m
    mem_reservation: 256m

    # 重启策略
    restart: always

    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # 依赖关系
    depends_on:
      - db
      - redis

    # 标签
    labels:
      - "com.example.description=Web server"
      - "com.example.department=IT"

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # 安全配置
    security_opt:
      - no-new-privileges:true
    cap_add:
      - NET_ADMIN
    cap_drop:
      - ALL
    privileged: false
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m

    # PID模式
    pid: "host"

    # IPC模式
    ipc: "host"

    # 其他配置
    stop_grace_period: 10s
    stop_signal: SIGTERM
    stdin_open: true
    tty: true