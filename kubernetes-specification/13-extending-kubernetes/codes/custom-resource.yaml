
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: metrics.example.com
spec:
  group: example.com
  versions:
    - name: v1
      served: true
      storage: true
  scope: Namespaced
  names:
    plural: metrics
    singular: metric
    kind: Metric
    shortNames:
      - met
  validation:
    openAPIV3Schema:
      type: object
      properties:
        spec:
          type: object
          properties:
            prometheus:
              type: string
            interval:
              type: string
            retention:
              type: string
        status:
          type: object
          properties:
            lastScrape:
              type: string
            condition:
              type: string
---
apiVersion: example.com/v1
kind: Metric
metadata:
  name: cluster-metrics
spec:
  prometheus: prometheus-operated
  interval: 30s
  retention: 15d