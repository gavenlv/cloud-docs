apiVersion: v1
kind: Pod
metadata:
  name: taint-toleration-pod
  namespace: default
  labels:
    app: taint-toleration
    environment: production
spec:
  containers:
  - name: app
    image: nginx:1.25.0
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  restartPolicy: Always
  terminationGracePeriodSeconds: 30
  tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "database"
    effect: "NoSchedule"
  - key: "gpu"
    operator: "Exists"
    effect: "NoExecute"
    tolerationSeconds: 300
  - key: "special-node"
    operator: "Equal"
    value: "true"
    effect: "NoExecute"