apiVersion: v1
kind: Pod
metadata:
  name: resource-limited-pod
  namespace: default
  labels:
    app: resource-limited
    environment: production
spec:
  containers:
  - name: app
    image: nginx:1.25.0
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
        ephemeral-storage: 1Gi
      limits:
        cpu: 500m
        memory: 512Mi
        ephemeral-storage: 2Gi
  - name: sidecar
    image: busybox:1.36
    command: ["sh", "-c", "sleep 3600"]
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
        ephemeral-storage: 512Mi
      limits:
        cpu: 200m
        memory: 256Mi
        ephemeral-storage: 1Gi
  restartPolicy: Always
  terminationGracePeriodSeconds: 30