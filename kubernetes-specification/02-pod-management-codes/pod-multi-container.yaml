apiVersion: v1
kind: Pod
metadata:
  name: multi-container-pod
  namespace: default
  labels:
    app: web-app
    environment: production
spec:
  containers:
  - name: web-app
    image: nginx:1.25.0
    ports:
    - containerPort: 80
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    volumeMounts:
    - name: app-logs
      mountPath: /var/log/nginx
  - name: log-collector
    image: fluent/fluentd:v1.16-1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    volumeMounts:
    - name: app-logs
      mountPath: /var/log/nginx
      readOnly: true
    - name: fluentd-config
      mountPath: /fluentd/etc/fluent.conf
      subPath: fluent.conf
  - name: metrics-exporter
    image: prom/node-exporter:v1.6.0
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    ports:
    - containerPort: 9100
      protocol: TCP
  restartPolicy: Always
  terminationGracePeriodSeconds: 30
  volumes:
  - name: app-logs
    emptyDir: {}
  - name: fluentd-config
    configMap:
      name: fluentd-config