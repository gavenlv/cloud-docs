apiVersion: v1
kind: Config
preferences: {}

clusters:
- name: kubernetes-dashboard
  cluster:
    server: https://localhost:30443
    # 如果使用自签名证书，需要添加
    insecure-skip-tls-verify: true

users:
- name: admin-user
  user:
    # 替换 <TOKEN> 为实际令牌
    # 获取令牌命令:
    # kubectl create token admin-user -n kubernetes-dashboard --duration=87600h
    token: <TOKEN>

contexts:
- name: dashboard-admin@kubernetes-dashboard
  context:
    cluster: kubernetes-dashboard
    user: admin-user
    namespace: kubernetes-dashboard

current-context: dashboard-admin@kubernetes-dashboard
