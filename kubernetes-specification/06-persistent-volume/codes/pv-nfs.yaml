
# Kubernetes API 版本
apiVersion: v1

# 资源类型
kind: PersistentVolume

# 元数据
metadata:
  name: nfs-pv
  namespace: default
  labels:
    app: app
    environment: production
  annotations:
    description: "NFS persistent volume"

# 规格说明
spec:
  # 容量
  capacity:
    storage: 100Gi

  # 访问模式 - NFS支持多节点读写
  accessModes:
    - ReadWriteMany

  # 回收策略
  persistentVolumeReclaimPolicy: Retain

  # 存储类名
  storageClassName: nfs-storage

  # NFS存储配置
  nfs:
    # NFS服务器地址
    # 可选值: IP地址或域名
    server: 192.168.1.100

    # NFS共享路径
    path: /export/data