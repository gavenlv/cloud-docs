apiVersion: v1
kind: Pod
metadata:
  name: configmap-env-pod
  namespace: default
  labels:
    app: configmap-env
    environment: production
spec:
  containers:
  - name: app
    image: nginx:1.25.0
    env:
    - name: DATABASE_URL
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: database.url
    - name: DATABASE_USERNAME
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: database.username
    - name: CACHE_ENABLED
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: cache.enabled
    - name: CACHE_TTL
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: cache.ttl
    envFrom:
    - configMapRef:
        name: app-config
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  restartPolicy: Always