apiVersion: v1
kind: Pod
metadata:
  name: secret-env-pod
  namespace: default
  labels:
    app: secret-env
    environment: production
spec:
  containers:
  - name: app
    image: nginx:1.25.0
    env:
    - name: DATABASE_USERNAME
      valueFrom:
        secretKeyRef:
          name: app-secret
          key: database.username
    - name: DATABASE_PASSWORD
      valueFrom:
        secretKeyRef:
          name: app-secret
          key: database.password
    - name: API_KEY
      valueFrom:
        secretKeyRef:
          name: app-secret
          key: api.key
    envFrom:
    - secretRef:
        name: app-secret
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  restartPolicy: Always