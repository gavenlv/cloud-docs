
# Kubernetes API 版本 - 核心API组
# 可选值: v1
apiVersion: v1

# 资源类型 - 配置映射
# 用于存储非敏感的配置数据
kind: ConfigMap

# 元数据
metadata:
  # ConfigMap名称 - 在namespace内必须唯一
  name: app-config

  # 所属namespace
  namespace: default

  # 标签
  labels:
    app: app
    environment: production

  # 注解
  annotations:
    description: "Application configuration"

# 数据 - 存储配置键值对
# 值必须是字符串
data:
  # 数据库URL
  # 示例: jdbc:mysql://localhost:3306/mydb
  database.url: "jdbc:mysql://localhost:3306/mydb"

  # 数据库用户名
  database.username: "admin"

  # 数据库密码 (生产环境应使用Secret)
  database.password: "secret"

  # 缓存开关
  # 可选值: "true", "false"
  cache.enabled: "true"

  # 缓存TTL (秒)
  cache.ttl: "3600"

  # 日志级别
  # 可选值: "debug", "info", "warn", "error"
  log.level: "info"

  # 日志格式
  # 可选值: "json", "text", "xml"
  log.format: "json"