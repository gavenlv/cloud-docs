apiVersion: v1
kind: Pod
metadata:
  name: secret-volume-pod
  namespace: default
  labels:
    app: secret-volume
    environment: production
spec:
  containers:
  - name: nginx
    image: nginx:1.25.0
    volumeMounts:
    - name: tls-secret
      mountPath: /etc/nginx/tls
      readOnly: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  restartPolicy: Always
  volumes:
  - name: tls-secret
    secret:
      secretName: tls-secret
      defaultMode: 0600