
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: myapps.example.com
  annotations:
    # 控制CRD版本
    controller-gen.kubebuilder.io/version: v0.9.0
spec:
  # API组
  group: example.com
  # 版本列表
  versions:
    - name: v1
      served: true          # 是否提供此版本
      storage: true         # 是否是存储版本（只能有一个）
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                replicas:
                  type: integer
                  minimum: 1
                  maximum: 10
                image:
                  type: string
            status:
              type: object
              properties:
                availableReplicas:
                  type: integer
  # 作用域：Namespaced或Cluster
  scope: Namespaced
  names:
    kind: MyApp           # CRD_kind
    listKind: MyAppList   # 列表类型
    plural: myapps         # REST API路径
    singular: myapp        # 单数形式
    shortNames:
      - ma               # 缩写
  preserveUnknownFields: false