apiVersion: v1
kind: Pod
metadata:
  name: node-selector-pod
  namespace: default
  labels:
    app: node-selector
    environment: production
spec:
  containers:
  - name: app
    image: nginx:1.25.0
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  restartPolicy: Always
  terminationGracePeriodSeconds: 30
  nodeSelector:
    disktype: ssd
    zone: us-west-1a