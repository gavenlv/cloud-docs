connection-optimization:
  keep-alive:
    enabled: true
    timeout: 65
    
  connection-pool:
    max-connections: 100
    max-connections-per-route: 20
    idle-timeout: 30s
    
  http2:
    enabled: true
    
  compression:
    enabled: true
    min-size: 1024
    types:
      - application/json
      - text/html
      - text/css
      - application/javascript