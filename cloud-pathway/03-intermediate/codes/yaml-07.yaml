# ClusterIP - 集群内部访问
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  # ============================================================
  # type: ClusterIP
  # ============================================================
  # 为什么需要:
  # └── 默认类型，只在集群内部可访问
  type: ClusterIP
  selector:
    app: web
  ports:
  - port: 80          # Service端口
    targetPort: 8080  # Pod端口
    protocol: TCP

# NodePort - 通过节点端口暴露
apiVersion: v1
kind: Service
metadata:
  name: web-nodeport
spec:
  # ============================================================
  # type: NodePort
  # ============================================================
  # 为什么需要:
  # └── 在每个节点上开放一个端口 (30000-32767)
  # 访问: <任意节点IP>:30080
  type: NodePort
  selector:
    app: web
  ports:
  - port: 80
    targetPort: 8080
    # nodePort: 30080  # 可选，指定端口

# LoadBalancer - 云厂商负载均衡
apiVersion: v1
kind: Service
metadata:
  name: web-loadbalancer
spec:
  # ============================================================
  # type: LoadBalancer
  # ============================================================
  # 为什么需要:
  # └── 云厂商自动创建负载均衡器
  # 自动分配外部IP
  type: LoadBalancer
  selector:
    app: web
  ports:
  - port: 80
    targetPort: 8080

# ExternalName - 外部服务别名
apiVersion: v1
kind: Service
metadata:
  name: my-db
spec:
  # ============================================================
  # type: ExternalName
  # ============================================================
  # 为什么需要:
  # └── 集群内访问外部服务的别名
  # DNS会返回CNAME记录
  type: ExternalName
  externalName: mydb.example.com