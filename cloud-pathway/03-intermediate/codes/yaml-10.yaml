# Secret - 敏感数据存储
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
type: Opaque  # 通用类型
stringData:
  # ============================================================
  # stringData - 明文写入（运行时编码）
  # ============================================================
  # 为什么使用:
  # └── 方便写入，无需手动Base64编码
  username: admin
  password: supersecret
  connection_string: "mysql://admin:supersecret@mysql:3306/db"

# 或使用 data 字段（需要Base64编码）
# data:
#   username: YWRtaW4=  # echo -n "admin" | base64

# 使用方式1: 环境变量
apiVersion: v1
kind: Pod
metadata:
  name: app
spec:
  containers:
  - name: app
    image: my-app:1.0
    env:
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: db-secret
          key: password

# 使用方式2: 卷挂载
    volumeMounts:
    - name: secret
      mountPath: /etc/secrets
      readOnly: true
  volumes:
  - name: secret
    secret:
      secretName: db-secret

# TLS Secret
apiVersion: v1
kind: Secret
metadata:
  name: tls-secret
type: kubernetes.io/tls
data:
  # 证书和密钥（Base64编码）
  tls.crt: LS0tLS1...
  tls.key: LS0tLS1...

# Docker Registry Secret
apiVersion: v1
kind: Secret
metadata:
  name: reg-secret
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: eyJhdXRocyI6...