# PersistentVolume - 多种存储类型
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-data
spec:
  # ============================================================
  # capacity - 容量
  # ============================================================
  capacity:
    storage: 10Gi

  # ============================================================
  # accessModes - 访问模式
  # ============================================================
  # 为什么需要:
  # └── 定义存储的访问方式
  # ├── ReadWriteOnce (RWO): 单节点读写
  # ├── ReadOnlyMany (ROX): 多节点只读
  # └── ReadWriteMany (RWX): 多节点读写
  accessModes:
  - ReadWriteOnce

  # ============================================================
  # persistentVolumeReclaimPolicy - 回收策略
  # ============================================================
  # 为什么需要:
  # └── PVC删除后的处理方式
  # ├── Retain: 保留数据（手动处理）
  # ├── Delete: 删除存储（云存储常用）
  # └── Recycle: 删除数据后重用（已废弃）
  persistentVolumeReclaimPolicy: Retain

  # ============================================================
  # storageClassName - 存储类
  # ============================================================
  # 为什么需要:
  # └── 动态创建PV时指定存储类型
  storageClassName: standard

  # ============================================================
  # 方式1: HostPath (本地存储)
  # ============================================================
  hostPath:
    path: /mnt/data
    type: DirectoryOrCreate

  # 方式2: NFS
  # nfs:
  #   server: nfs-server.example.com
  #   path: /exports

  # 方式3: 云存储
  # awsElasticBlockStore:
  #   volumeID: vol-12345
  #   fsType: ext4

  # 方式4: GCE Persistent Disk
  # gcePersistentDisk:
  #   pdName: my-disk
  #   fsType: ext4