global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'doris-prod'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'doris-fe'
    static_configs:
      - targets: ['fe1:8030']
        labels:
          group: 'frontend'
          instance: 'fe1'
      - targets: ['fe2:8030']
        labels:
          group: 'frontend'
          instance: 'fe2'
      - targets: ['fe3:8030']
        labels:
          group: 'frontend'
          instance: 'fe3'

  - job_name: 'doris-be'
    static_configs:
      - targets: ['be1:8040']
        labels:
          group: 'backend'
          instance: 'be1'
      - targets: ['be2:8040']
        labels:
          group: 'backend'
          instance: 'be2'
      - targets: ['be3:8040']
        labels:
          group: 'backend'
          instance: 'be3'

  - job_name: 'doris-be-process'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['be1:8040', 'be2:8040', 'be3:8040']
        labels:
          group: 'be_process'
