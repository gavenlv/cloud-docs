# LDAP配置示例
# 将此文件复制到FE的conf目录

# LDAP服务器配置
authentication_ldap = true
ldap_server = ldap://ldap.example.com:389
ldap_user_basedn = dc=example,dc=com
ldap_user_filter = (uid=%s)
ldap_bind_dn = cn=admin,dc=example,dc=com
ldap_bind_password = admin_password

# 用户组映射
ldap_user_search_base = ou=people,dc=example,dc=com
ldap_group_filter = (objectClass=groupOfNames)
ldap_group_basedn = ou=groups,dc=example,dc=com

# 缓存配置
authentication_ldap_cache_enable = true
authentication_ldap_cache_size = 1000
authentication_ldap_cache_timeout = 3600
