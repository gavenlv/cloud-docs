# changed-status.yml
---
- name: changed状态示例
  hosts: webservers
  become: true
  tasks:
    - name: 安装Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes
      register: nginx_install
    
    - name: 显示安装状态
      debug:
        msg: "Nginx安装状态: {{ nginx_install.changed }}"
    
    - name: 创建文件
      file:
        path: /var/www/html/index.html
        state: touch
      register: file_create
    
    - name: 显示文件创建状态
      debug:
        msg: "文件创建状态: {{ file_create.changed }}"
    
    - name: 启动服务
      service:
        name: nginx
        state: started
        enabled: yes
      register: service_start
    
    - name: 显示服务启动状态
      debug:
        msg: "服务启动状态: {{ service_start.changed }}"