# file-modules.yml
---
- name: 文件模块示例
  hosts: webservers
  become: true
  tasks:
    - name: 创建目录
      file:
        path: /var/www/html
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'
    
    - name: 创建文件
      file:
        path: /var/www/html/index.html
        state: touch
        owner: www-data
        group: www-data
        mode: '0644'
    
    - name: 创建符号链接
      file:
        src: /var/www/html
        dest: /var/www
        state: link
    
    - name: 复制文件
      copy:
        src: files/index.html
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'
        backup: yes
    
    - name: 创建模板文件
      template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/nginx.conf
        owner: root
        group: root
        mode: '0644'
        backup: yes
        validate: 'nginx -t -c %s'
    
    - name: 获取文件信息
      stat:
        path: /var/www/html/index.html
      register: file_info
    
    - name: 显示文件信息
      debug:
        msg: "文件大小: {{ file_info.stat.size }} 字节"
    
    - name: 查找文件
      find:
        paths: /var/www/html
        patterns: "*.html"
        recurse: yes
      register: html_files
    
    - name: 显示找到的文件
      debug:
        msg: "找到 {{ html_files.matched }} 个HTML文件"
    
    - name: 同步目录
      synchronize:
        src: /local/path/
        dest: /var/www/html/
        delete: yes
        recursive: yes
    
    - name: 删除文件
      file:
        path: /var/www/html/old.html
        state: absent