# inventory.yml

all:
  children:
    webservers:
      hosts:
        web1.example.com:
          http_port: 8080
          document_root: /var/www/web1
        web2.example.com:
          http_port: 8080
          document_root: /var/www/web2
        web3.example.com:
          http_port: 8080
          document_root: /var/www/web3
      vars:
        https_port: 8443
        server_name: example.com
        ssl_enabled: true
        ssl_cert_path: /etc/ssl/certs/example.com.crt
        ssl_key_path: /etc/ssl/private/example.com.key