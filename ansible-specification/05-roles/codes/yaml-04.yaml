# roles/nginx/tasks/install.yml
---
- name: 更新系统包
  apt:
    update_cache: yes
    cache_valid_time: 3600
  become: true
  tags:
    - nginx
    - install

- name: 安装Nginx包
  apt:
    name: "{{ nginx_packages }}"
    state: present
    update_cache: yes
  become: true
  register: nginx_install
  tags:
    - nginx
    - install

- name: 创建Nginx用户
  user:
    name: "{{ nginx_user }}"
    system: yes
    shell: /usr/sbin/nologin
    home: /var/lib/nginx
    create_home: no
    state: present
  become: true
  tags:
    - nginx
    - install