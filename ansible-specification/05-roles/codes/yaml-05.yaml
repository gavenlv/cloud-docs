# roles/nginx/tasks/configure.yml
---
- name: 创建文档根目录
  file:
    path: "{{ nginx_document_root }}"
    state: directory
    owner: "{{ nginx_user }}"
    group: "{{ nginx_group }}"
    mode: '0755'
  become: true
  tags:
    - nginx
    - configure

- name: 创建Nginx配置目录
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true
  loop:
    - "{{ nginx_sites_available }}"
    - "{{ nginx_sites_enabled }}"
  tags:
    - nginx
    - configure

- name: 配置Nginx
  template:
    src: nginx.conf.j2
    dest: "{{ nginx_config_file }}"
    owner: root
    group: root
    mode: '0644'
    validate: 'nginx -t -c %s'
    backup: yes
  become: true
  notify:
    - 重新加载Nginx服务
  tags:
    - nginx
    - configure

- name: 创建默认站点配置
  template:
    src: default-site.conf.j2
    dest: "{{ nginx_sites_available }}/default"
    owner: root
    group: root
    mode: '0644'
  become: true
  notify:
    - 重新加载Nginx服务
  tags:
    - nginx
    - configure

- name: 启用默认站点
  file:
    src: "{{ nginx_sites_available }}/default"
    dest: "{{ nginx_sites_enabled }}/default"
    state: link
  become: true
  notify:
    - 重新加载Nginx服务
  tags:
    - nginx
    - configure

- name: 创建首页文件
  copy:
    content: |
      <!DOCTYPE html>
      <html>
      <head>
          <title>Welcome to Nginx</title>
      </head>
      <body>
          <h1>Hello, World!</h1>
          <p>Nginx is running successfully.</p>
      </body>
      </html>
    dest: "{{ nginx_document_root }}/index.html"
    owner: "{{ nginx_user }}"
    group: "{{ nginx_group }}"
    mode: '0644'
  become: true
  tags:
    - nginx
    - configure