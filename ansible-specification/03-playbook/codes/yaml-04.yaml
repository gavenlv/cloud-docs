# task-basic.yml
---
- name: 基本Task示例
  hosts: webservers
  become: true
  tasks:
    - name: 安装Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes
    
    - name: 启动Nginx服务
      service:
        name: nginx
        state: started
        enabled: yes
    
    - name: 创建文档根目录
      file:
        path: /var/www/html
        state: directory
        mode: '0755'
    
    - name: 创建首页文件
      copy:
        content: "Hello, World!"
        dest: /var/www/html/index.html
        mode: '0644'