# playbook-multi-play.yml
---
- name: 配置Web服务器
  hosts: webservers
  become: true
  vars:
    http_port: 80
    document_root: /var/www/html
  tasks:
    - name: 安装Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes
    
    - name: 启动Nginx服务
      service:
        name: nginx
        state: started
        enabled: yes

- name: 配置数据库服务器
  hosts: dbservers
  become: true
  vars:
    mysql_root_password: secret
    mysql_database: appdb
  tasks:
    - name: 安装MySQL
      apt:
        name: mysql-server
        state: present
        update_cache: yes
    
    - name: 启动MySQL服务
      service:
        name: mysql
        state: started
        enabled: yes
    
    - name: 创建数据库
      mysql_db:
        name: "{{ mysql_database }}"
        state: present
        login_user: root
        login_password: "{{ mysql_root_password }}"

- name: 配置监控服务器
  hosts: monitoring
  become: true
  vars:
    prometheus_port: 9090
    grafana_port: 3000
  tasks:
    - name: 安装Prometheus
      apt:
        name: prometheus
        state: present
        update_cache: yes
    
    - name: 启动Prometheus服务
      service:
        name: prometheus
        state: started
        enabled: yes